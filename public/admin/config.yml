backend:
  name: git-gateway
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

site_url: https://rahulnewsite.netlify.app
display_url: https://rahulnewsite.netlify.app

collections:
  # ---------------------------------------------------------------- Projects
  - name: projects
    label: "Projects"
    files:
      - name: projects
        label: "All Projects"
        file: "content/projects.json"
        description: "Your portfolio. Drag entries up/down to reorder the Work/Archive page, or set the Order number directly. Tick Feature and/or Hero to also show a project on the homepage, and use their position numbers to control where it lands there."
        fields:
          - name: projects
            label: "Projects"
            label_singular: "Project"
            widget: list
            summary: "{{fields.title}} — {{fields.subtitle}}"
            fields:
              - { name: title, label: "Title", widget: string }
              - { name: subtitle, label: "Subtitle", widget: string }
              - name: slug
                label: "Web address (lowercase, dashes, no spaces)"
                widget: string
                pattern: ["^[a-z0-9-]+$", "Lowercase letters, numbers and dashes only"]
              - name: categories
                label: "Categories (choose one or more)"
                widget: select
                multiple: true
                options:
                  - { label: "Campaigns", value: "campaigns" }
                  - { label: "Social", value: "social" }
                  - { label: "Photo", value: "photo" }
                  - { label: "Video", value: "video" }
                  - { label: "Art Direction", value: "art-direction" }
              - { name: description, label: "Description", widget: text }
              - name: featuredImage
                label: "Cover image (grid + card)"
                widget: image
                required: false
              - name: heroImage
                label: "Hero image (used if this is a homepage hero)"
                widget: image
                required: false
              - name: featuredFocalPoint
                label: "Cover image crop focus (if a head or subject gets cut off, or on the homepage hero the headline text covers them, nudge this)"
                widget: select
                options:
                  - { label: "Top-left", value: "top-left" }
                  - { label: "Top", value: "top" }
                  - { label: "Top-right", value: "top-right" }
                  - { label: "Left", value: "left" }
                  - { label: "Center", value: "center" }
                  - { label: "Right", value: "right" }
                  - { label: "Bottom-left", value: "bottom-left" }
                  - { label: "Bottom", value: "bottom" }
                  - { label: "Bottom-right", value: "bottom-right" }
                default: "center"
                required: false
              - name: media
                label: "Photos & Videos (drag to reorder — mix them however you like, they'll appear on the project page in this exact order)"
                widget: list
                required: false
                collapsed: true
                summary: "{{fields.image}}{{fields.url}}"
                types:
                  - label: "Photo"
                    name: image
                    widget: object
                    summary: "{{fields.image}}"
                    fields:
                      - { name: image, label: "Image", widget: image }
                      - name: caption
                        label: "Caption (optional — shows in a small label when someone hovers the image, e.g. \"DSP photo\". Leave blank for nothing.)"
                        widget: string
                        required: false
                      - name: focalPoint
                        label: "Crop focus (if a head or subject gets cut off, nudge this)"
                        widget: select
                        options:
                          - { label: "Top-left", value: "top-left" }
                          - { label: "Top", value: "top" }
                          - { label: "Top-right", value: "top-right" }
                          - { label: "Left", value: "left" }
                          - { label: "Center", value: "center" }
                          - { label: "Right", value: "right" }
                          - { label: "Bottom-left", value: "bottom-left" }
                          - { label: "Bottom", value: "bottom" }
                          - { label: "Bottom-right", value: "bottom-right" }
                        default: "center"
                        required: false
                  - label: "Video"
                    name: video
                    widget: object
                    summary: "{{fields.url}}"
                    fields:
                      - name: url
                        label: "Video link (YouTube, Vimeo, TikTok or Instagram post — YouTube playlist links work too)"
                        widget: string
                      - name: caption
                        label: "Caption (optional — shows as a small label, e.g. \"Album Visualizers\". Leave blank for nothing.)"
                        widget: string
                        required: false
              - { name: featured, label: "Feature on homepage (Instagram-row strip)", widget: boolean, default: false }
              - name: featuredOrder
                label: "Position in that homepage strip (lower shows first, left to right) — only matters if Feature is ticked"
                widget: number
                value_type: int
                required: false
              - { name: hero, label: "Include in homepage hero collage (top of homepage)", widget: boolean, default: false }
              - name: heroOrder
                label: "Position in the hero collage (lower shows first) — only matters if Hero is ticked"
                widget: number
                value_type: int
                required: false
              - name: order
                label: "Order on the Work/Archive page (lower shows first)"
                widget: number
                value_type: int
                default: 99
              - name: accent
                label: "Accent colour (hex, used before a cover image is added)"
                widget: string
                required: false
                default: "#888888"
              - name: placeholderCount
                label: "Placeholder frames (until gallery images are added)"
                widget: number
                value_type: int
                required: false
                default: 6
              - { name: client, label: "Client", widget: string, required: false }
              - { name: location, label: "Location", widget: string, required: false }
              - { name: year, label: "Year", widget: string, required: false }
              - { name: externalUrl, label: "External link", widget: string, required: false }
              - { name: seoTitle, label: "SEO title", widget: string, required: false }
              - { name: seoDescription, label: "SEO description", widget: text, required: false }

  # ------------------------------------------------------------- Featured In
  - name: press
    label: "Featured In"
    files:
      - name: press
        label: "Press Features"
        file: "content/press.json"
        description: "Publications that have featured your work. Add as many as you like — a Load More button appears on the page after eight."
        fields:
          - name: press
            label: "Features"
            label_singular: "Feature"
            widget: list
            summary: "{{fields.publication}} — {{fields.title}}"
            fields:
              - name: publication
                label: "Publication (type any name — Billboard, Rolling Stone, Variety, NME, Clash and Wonderland get a styled logo-style wordmark; anything else shows as plain styled text)"
                widget: string
              - { name: title, label: "Article title", widget: string }
              - { name: date, label: "Date (e.g. June 2024)", widget: string }
              - { name: url, label: "Link to article", widget: string, required: false }

  # ------------------------------------------------------------------ Awards
  - name: awards
    label: "Awards"
    files:
      - name: awards
        label: "Awards"
        file: "content/awards.json"
        description: "Awards shown on the homepage."
        fields:
          - name: awards
            label: "Awards"
            label_singular: "Award"
            widget: list
            summary: "{{fields.name}} — {{fields.detail}}"
            fields:
              - { name: name, label: "Award name", widget: string }
              - { name: detail, label: "Detail (e.g. Winner, Camila Cabello)", widget: string }
              - name: link
                label: "Link (optional — e.g. to the project page it's for, or a press release)"
                widget: string
                required: false

  # ---------------------------------------------------------------- Homepage
  - name: home
    label: "Homepage"
    files:
      - name: home
        label: "Hero, About & Instagram"
        file: "content/home.json"
        fields:
          - name: hero
            label: "Hero"
            widget: object
            fields:
              - { name: headline, label: "Headline (one line per line break)", widget: text }
              - { name: supporting, label: "Supporting line", widget: text }
              - { name: cta, label: "Button label", widget: string }
          - name: about
            label: "About"
            widget: object
            fields:
              - { name: heading, label: "Heading (one line per line break)", widget: text }
              - { name: body, label: "Body (blank line between paragraphs)", widget: text }
              - { name: image, label: "Portrait photo", widget: image, required: false }
          - name: instagram
            label: "Instagram row"
            widget: object
            fields:
              - name: images
                label: "Six images"
                widget: list
                required: false
                field: { name: image, label: "Image", widget: image }

  # ------------------------------------------------------------ Site Settings
  - name: settings
    label: "Site Settings"
    files:
      - name: general
        label: "General & SEO"
        file: "content/settings.json"
        fields:
          - { name: name, label: "Your name", widget: string }
          - { name: role, label: "Role (e.g. Photographer & Director)", widget: string }
          - { name: email, label: "Contact email", widget: string }
          - { name: instagramHandle, label: "Instagram handle (e.g. @rahulb91)", widget: string }
          - { name: instagramUrl, label: "Instagram link", widget: string }
          - name: instagramFeedUrl
            label: "Instagram feed URL (from behold.so — shows your latest posts on the homepage)"
            widget: string
            required: false
          - { name: url, label: "Website address", widget: string }
          - name: web3formsAccessKey
            label: "Contact form access key (from web3forms.com — safe to make public, only used to route the form to your email)"
            widget: string
            required: false
          - { name: seoTitle, label: "Default SEO title", widget: string }
          - { name: seoDescription, label: "Default SEO description", widget: text }
          - { name: seoImage, label: "Social share image", widget: image, required: false }
